# ──────────────────────────────────────────────────────────
# Table of Contents
# ──────────────────────────────────────────────────────────
# Structure: When a chapter is being written, expand its
# entry with a `sections:` block listing topic files.
# Each topic is either a .md (reading) or .ipynb (notebook).
#
# Example:
#   - file: chapters/01_python_foundations/index
#     sections:
#       - file: chapters/01_python_foundations/01_variables_types
#       - file: chapters/01_python_foundations/02_control_flow
# ──────────────────────────────────────────────────────────

format: jb-book
root: intro

parts:

